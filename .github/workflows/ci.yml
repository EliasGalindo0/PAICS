name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MONGO_URI: mongodb://localhost:27017/
  MONGO_DB_NAME: paics_db_test
  JWT_SECRET_KEY: ci-secret-key-for-tests
  GOOGLE_API_KEY: dummy-key-for-ci-tests

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run unit tests
        run: pytest tests/unit -v --tb=short

      - name: Run E2E tests
        run: pytest tests/e2e -v --tb=short --timeout=180

  # Job de lint (opcional para branch protection)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install pylint
      - name: Lint Python
        run: pylint database auth utils ai knowledge_base vector_db --exit-zero --max-line-length=100 2>/dev/null || true
