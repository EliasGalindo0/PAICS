[theme]
backgroundColor = "#FFFFFF"
font = "sans serif"
primaryColor = "#1e88e5"
secondaryBackgroundColor = "#f5f9fc"
textColor = "#1a237e"

[server]
# CORS deve ser true quando XSRF está ativo (Streamlit exige origins para o cookie CSRF)
enableCORS = true
enableXsrfProtection = true
headless = true
port = 8501

[browser]
gatherUsageStats = false
