[theme]
backgroundColor = "#FFFFFF"
font = "sans serif"
primaryColor = "#1e88e5"
secondaryBackgroundColor = "#f5f9fc"
textColor = "#1a237e"

[server]
# CORS e XSRF desativados: em produção (Railway/proxy) os headers gerados pelo Streamlit
# podem causar AxiosError 400 no file_uploader. O proxy trata CORS.
enableCORS = false
enableXsrfProtection = false
headless = true
port = 8501
# Tamanho máximo por arquivo (MB)
maxUploadSize = 200

[browser]
gatherUsageStats = false
