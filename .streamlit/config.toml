[theme]
backgroundColor = "#FFFFFF"
font = "sans serif"
primaryColor = "#1e88e5"
secondaryBackgroundColor = "#f5f9fc"
textColor = "#1a237e"

[server]
# CORS deve ser true quando XSRF está ativo (Streamlit exige origins para o cookie CSRF)
enableCORS = true
# XSRF desativado: em produção (Railway, etc.) o cookie _xsrf não é enviado no upload
# e causa AxiosError 400. Para apps públicos com file_uploader é o workaround recomendado.
enableXsrfProtection = false
headless = true
port = 8501
# Tamanho máximo por arquivo (MB); default 200
maxUploadSize = 200

[browser]
gatherUsageStats = false
