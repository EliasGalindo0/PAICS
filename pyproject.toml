[tool.black]
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | venv
  | _build
  | buck-out
  | build
  | dist
)/
'''
include = '\.pyi?$'
line-length = 100
target-version = ['py38', 'py39', 'py310', 'py311', 'py312', 'py313']

[tool.isort]
line_length = 100
profile = "black"
skip = ["venv", ".venv", "build", "dist", "*.egg-info"]

[tool.pylint.main]
max-line-length = 100

[tool.pylint.format]
max-line-length = 100
